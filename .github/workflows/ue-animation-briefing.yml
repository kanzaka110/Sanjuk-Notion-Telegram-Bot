name: 🎮 UE 애니메이션 데일리 브리핑

on:
  schedule:
    # 매일 오전 9시 KST (KST = UTC+9 → UTC 00:00)
    - cron: '0 0 * * *'

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      category:
        description: '특정 카테고리 지정 (비워두면 자동 선택)'
        required: false
        type: choice
        options:
          - ''
          - Animation Blueprint
          - Control Rig
          - Motion Matching
          - UAF/AnimNext
          - MetaHuman
          - Sequencer
          - Live Link
          - ML Deformer
          - GASP
          - Mover Plugin
      count:
        description: '브리핑할 카테고리 수 (category 미지정 시)'
        required: false
        default: '1'
        type: string
      all_categories:
        description: '모든 카테고리 브리핑 (true/false)'
        required: false
        default: 'false'
        type: boolean
      force:
        description: '중복 체크 무시 — 재생성 (true/false)'
        required: false
        default: 'false'
        type: boolean
      per_version:
        description: 'UE 버전별 개별 페이지 생성 (true/false)'
        required: false
        default: 'false'
        type: boolean

jobs:
  daily-briefing:
    name: 📋 UE 애니메이션 데일리 브리핑 생성
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ─── 1. 코드 체크아웃 ────────────────────────────────────────
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      # ─── 2. Python 환경 설정 ─────────────────────────────────────
      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'UE_bot/requirements.txt'

      # ─── 3. 의존성 설치 ──────────────────────────────────────────
      - name: 📦 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r UE_bot/requirements.txt

      # ─── 4. 브리핑 실행 ──────────────────────────────────────────
      - name: 🎮 데일리 브리핑 실행
        id: briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # GitHub Actions 환경 표시
          CI: 'true'
        run: |
          echo "========================================="
          echo "🎮 UE 애니메이션 데일리 브리핑 시작"
          echo "📅 실행 시각: $(TZ='Asia/Seoul' date '+%Y년 %m월 %d일 %H:%M KST')"
          echo "========================================="

          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --force"
            echo "⚡ FORCE 모드 활성화"
          fi
          if [ "${{ github.event.inputs.per_version }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --per-version"
            echo "📦 버전별 분리 모드 활성화"
          fi

          if [ "${{ github.event.inputs.all_categories }}" = "true" ]; then
            echo "📂 모드: 전체 카테고리"
            python UE_bot/briefing.py --all $EXTRA_FLAGS

          elif [ -n "${{ github.event.inputs.category }}" ]; then
            echo "📂 모드: 특정 카테고리 — ${{ github.event.inputs.category }}"
            python UE_bot/briefing.py --category "${{ github.event.inputs.category }}" $EXTRA_FLAGS

          else
            COUNT="${{ github.event.inputs.count || '1' }}"
            echo "📂 모드: 자동 선택 (${COUNT}개 카테고리)"
            python UE_bot/briefing.py --count "${COUNT}" $EXTRA_FLAGS
          fi

      # ─── 5. 실패 시 알림 (선택사항) ─────────────────────────────
      - name: ❌ 실패 알림
        if: failure()
        run: |
          echo "::error::브리핑 생성 실패. 로그를 확인해주세요."
          echo "ANTHROPIC_API_KEY 설정 여부: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "NOTION_API_KEY 설정 여부: ${{ secrets.NOTION_API_KEY != '' }}"

      # ─── 6. 완료 요약 ────────────────────────────────────────────
      - name: ✅ 브리핑 완료 요약
        if: success()
        run: |
          echo "========================================="
          echo "✅ 브리핑 완료!"
          echo "📌 Notion 데이터베이스 확인:"
          echo "   https://www.notion.so/${{ secrets.NOTION_DATABASE_ID || '4fd756cb968d4439b9e80bbc69184a57' }}"
          echo "========================================="
