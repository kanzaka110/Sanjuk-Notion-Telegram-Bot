name: 🤖 산적주식비서 텔레그램 봇 (상시 실행)

on:
  workflow_dispatch:  # 수동 시작
  # schedule 비활성화 — GCP에서 상시 실행
  # schedule:
  #   - cron: "0 */6 * * *"

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GitHub Actions 최대 ~6시간

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Stock_bot/requirements.txt"

      - name: 📦 패키지 설치
        run: pip install -r Stock_bot/requirements.txt

      - name: 🤖 봇 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
        run: cd Stock_bot/scripts && python telegram_bot.py
